[project]
name = "untangle"
version = "0.0.0"
description = "Fast Jax package for decoupling multivariate functions using tensor decompositions."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "beartype>=0.22.9",
    "ipykernel>=7.2.0",
    "jax>=0.9.0.1",
    "jaxtyping>=0.3.9",
    "jupyterlab>=4.5.6",
    "matplotlib>=3.10.8",
    "scikit-learn>=1.8.0",
    "seaborn>=0.13.2",
    "tqdm>=4.67.3",
]

[tool.setuptools]
packages = ["untangle"]
